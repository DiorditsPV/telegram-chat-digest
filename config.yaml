# Конфигурация выгрузки. Список целей = пары (чат, топик).
#
# Поле chat принимает одно из:
#   - @username             публичный супергруппа/канал (напр. @example_chat)
#   - числовой id           5264271495  (как в экспорте Telegram Desktop)
#   - точное название чата  "My Team"   (резолвится по списку диалогов)
# Поле topic:
#   - id корневого сообщения топика (message_thread_id) для форум-чатов
#   - null для плоских групп
#
# name — это slug для путей data/<name>/ и заголовков артефактов.

data_dir: ./data
session: ./secrets/tg            # файл сессии Telethon -> secrets/tg.session

# Дотягивать ли хвост ради правок/реакций. По умолчанию 0 (только новые).
# Если хотите ловить правки — поставьте, напр., 200.
trailing_refresh: 0

# --- Примеры целей. Замените на свои чаты. ---
targets:
  - name: team-platform
    chat: "@example_supergroup"   # публичная супергруппа по @username
    topic: 12                     # id топика (форум-чат)

  - name: team-ops
    chat: "My Ops Group"          # приватная группа — по точному названию
    topic: null                   # плоская группа без топиков

  - name: team-newchat
    chat: 1234567890              # по числовому id
    topic: null
    backfill_days: 7              # первая загрузка: только последние 7 дней
